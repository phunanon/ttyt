<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTYT</title>
    <style>
      :root {
        --input: #6f97cf;
        --inputting: #7fa7df;
        --act: #cfcf6f;
        --read: #6fcf97;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 1.1rem;
        &:not(code):not(pre) {
          font-family: sans-serif;
        }
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: #444;
        color: #fff;
      }
      h1 {
        font-size: 2rem;
      }
      button {
        padding: 0.5rem;
        cursor: pointer;
      }
      a {
        color: lightblue;
      }
      .column {
        display: flex;
        flex-direction: column;
        max-width: 100vw;
      }
      .row,
      .row-inline {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        max-width: 100vw;
      }
      .row-inline {
        display: inline-flex;
        flex-wrap: nowrap;
      }
      .gap-05 {
        gap: 0.5rem;
      }
      .gap-1 {
        gap: 1rem;
      }
      .m-1 {
        margin: 1rem;
      }
      .p-05 {
        padding: 0.5rem;
      }
      .p-1 {
        padding: 1rem;
      }
      .fill {
        flex: 1;
      }
      input,
      textarea,
      button,
      select,
      pre {
        border: none;
        background-color: #000;
        color: #fff;
        padding: 0.5rem;
      }
      input:not([type='checkbox']),
      textarea,
      select {
        border: 2px solid var(--input);
        min-width: 3rem;
        resize: none;

        &:focus {
          outline: none;
          border-color: white;
        }
      }
      button:hover {
        border-color: #fff;
      }
      input[type='checkbox'] {
        width: 1.5rem;
        height: 1.5rem;
      }
      pre {
        border: 2px solid var(--read);
        border-radius: 0.5rem;
        white-space: pre-wrap;
      }
      .space-between {
        justify-content: space-between;
      }
      .mail {
        border-radius: 0;
        border: 0;
        background-color: transparent;
        &:not(:last-child) {
          border-bottom: 0.1rem solid var(--read);
        }
        &:hover,
        &.viewing {
          background-color: #555;
        }
      }
      .ellipsis {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding-right: 1rem;
      }
      .align-items-center {
        align-items: center;
      }
      .card {
        margin: 0.5rem;
        padding: 0.5rem;
        background-color: #333;
        border-radius: 0.5rem;
      }
      button {
        border: 2px solid var(--act);
        border-radius: 0.5rem;
      }
      .btn-group {
        flex-shrink: 0;
        > button:first-child:not(:last-child) {
          border-radius: 0.5rem 0 0 0.5rem;
          border-left: 2px solid var(--act);
        }
        > button:last-child:not(:first-child) {
          border-radius: 0 0.5rem 0.5rem 0;
        }
        > button {
          border-top: 2px solid var(--act);
          border-bottom: 2px solid var(--act);
          border-right: 2px solid var(--act);

          &:hover {
            border-color: #fff;
          }
        }
      }
      .input-group {
        > input {
          border-radius: 0.5rem 0 0 0.5rem;
        }
        > button {
          border-radius: 0 0.5rem 0.5rem 0;
        }
      }
      .scroll {
        overflow-y: scroll;
      }
      .no-wrap {
        flex-wrap: nowrap;
      }
      .time {
        color: var(--read);
      }
      select#contact_list {
        color: #000;
      }
      @media only screen and (max-width: 512px) {
        h1 {
          display: none;
        }
        .card {
          margin: 0;
        }
      }
    </style>

    <script type="module" src="/src/index.tsx"></script>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#444" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg" />
  </head>
  <body></body>
</html>

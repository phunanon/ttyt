<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTYT</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 1.1rem;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: #333;
        color: #eee;
      }
      button {
        padding: 0.5rem;
      }
      .column {
        display: flex;
        flex-direction: column;
        max-width: 100vw;
      }
      .row {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        max-width: 100vw;
      }
      .gap-05 {
        gap: 0.5rem;
      }
      .gap-1 {
        gap: 1rem;
      }
      .m-1 {
        margin: 1rem;
      }
      .p-05 {
        padding: 0.5rem;
      }
      .p-1 {
        padding: 1rem;
      }
      .px-05 {
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }
      .fill {
        flex: 1;
      }
      input,
      textarea,
      button,
      pre {
        background-color: #000;
        color: #fff;
        padding: 0.5rem;
        border-radius: 0.5rem;
      }
      button.sm {
        padding: 0.25rem 0.25rem 0rem 0.25rem;
        min-width: 2.5rem;
      }
      .space-between {
        justify-content: space-between;
      }
      .mail:not(:last-child) {
        border-bottom: 0.1rem solid black;
      }
      .mail:hover {
        background-color: #444;
        cursor: pointer;
      }
      .mail.viewing {
        background-color: #555;
      }
      .ellipsis {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 6rem;
      }
      .align-items-center {
        align-items: center;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "preact": "./preact.module.js",
          "preact/hooks": "./hooks.module.js",
          "preact/jsx-runtime": "./jsxRuntime.module.js"
        }
      }
    </script>

    <script type="module" src="index.js"></script>
  </head>
  <body></body>
</html>

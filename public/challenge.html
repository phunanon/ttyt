<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Proof-of-work reference implementation</title>
    <script src="/public/challenge.js"></script>
    <style>
      .row {
        display: flex;
        flex-direction: row;
        gap: 16px;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <p>
      Use this reference implementation to generate a proof-of-work for the
      <a href="/register">/register</a> or <a href="/mint">/mint</a> endpoints.
    </p>
    <form id="token-form" class="row">
      <fieldset id="token-fieldset" class="col">
        <input placeholder="token" />
        <input type="number" placeholder="leading zero bits" />
        <button type="button" onclick="StartWork()">Generate proof</button>
      </fieldset>
      <pre id="status"></pre>
    </form>
    <form id="register-form" class="row">
      <fieldset id="register-fieldset" class="col" disabled>
        <input name="key" placeholder="key" readonly />
        <input name="tok" placeholder="tok" readonly />
        <input name="sig" placeholder="sig" readonly />
        <button type="button" onclick="PostProof('/register', 'register-form')">
          POST /register
        </button>
      </fieldset>
      <pre id="private-key"></pre>
    </form>
    <form id="mint-form" class="row">
      <fieldset id="mint-fieldset" class="col" disabled>
        <input name="own" placeholder="owner identity" />
        <input name="key" placeholder="key" readonly />
        <input name="tok" placeholder="tok" readonly />
        <input name="sig" placeholder="sig" readonly />
        <input name="str" placeholder="str" />
        <button type="button" onclick="PostProof('/mint', 'mint-form')">
          POST /mint
        </button>
      </fieldset>
    </form>
    <pre id="response"></pre>
  </body>
</html>
